<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — 重新定义未来</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --grad-1: #ff2d55;
    --grad-2: #6e2cff;
    --grad-3: #00d4ff;
    --grad-4: #ff8a00;
    --grad-5: #18e1a0;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
    background: #0a0a0a;
  }

  /* ── Gradient Video Canvas ── */
  .gradient-video {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .gradient-video canvas {
    width: 100%; height: 100%;
    display: block;
  }

  /* ── Grain Overlay ── */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* ── Vignette ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  }

  /* ── Content Layer ── */
  .hero {
    position: relative;
    z-index: 10;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
    padding: 2rem;
  }

  /* ── Nav ── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, #fff 30%, var(--grad-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: color 0.3s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 2px;
    background: linear-gradient(90deg, var(--grad-1), var(--grad-3));
    transition: width 0.3s;
    border-radius: 2px;
  }

  .nav-links a:hover { color: #fff; }
  .nav-links a:hover::after { width: 100%; }

  /* ── Badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1.2rem;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.02em;
    margin-bottom: 2rem;
    animation: fadeInUp 1s ease 0.2s both;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--grad-5);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.5); }
  }

  /* ── Title ── */
  .title {
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 900;
    line-height: 1.08;
    letter-spacing: -0.03em;
    max-width: 900px;
    animation: fadeInUp 1s ease 0.4s both;
  }

  .title .highlight {
    background: linear-gradient(135deg, var(--grad-1), var(--grad-2), var(--grad-3));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease-in-out infinite;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* ── Subtitle ── */
  .subtitle {
    font-size: clamp(1rem, 2vw, 1.35rem);
    font-weight: 300;
    line-height: 1.7;
    color: rgba(255,255,255,0.6);
    max-width: 560px;
    margin-top: 1.5rem;
    animation: fadeInUp 1s ease 0.6s both;
  }

  /* ── CTA Buttons ── */
  .cta-group {
    display: flex;
    gap: 1rem;
    margin-top: 2.5rem;
    animation: fadeInUp 1s ease 0.8s both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.9rem 2rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    border: none;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--grad-1), var(--grad-2));
    color: #fff;
    box-shadow: 0 4px 24px rgba(110,44,255,0.35), 0 0 0 0 rgba(255,45,85,0);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(110,44,255,0.5), 0 0 40px rgba(255,45,85,0.2);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
    color: #fff;
    border-color: rgba(255,255,255,0.25);
  }

  .btn-arrow {
    transition: transform 0.3s;
  }

  .btn:hover .btn-arrow {
    transform: translateX(4px);
  }

  /* ── Scroll Indicator ── */
  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    animation: fadeInUp 1s ease 1.2s both;
  }

  .scroll-hint span {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 1; transform: scaleY(1); }
    50% { opacity: 0.3; transform: scaleY(0.6); }
  }

  /* ── Floating Orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 3;
    opacity: 0.4;
  }

  .orb-1 {
    width: 400px; height: 400px;
    background: var(--grad-2);
    top: -10%; right: -5%;
    animation: float1 8s ease-in-out infinite;
  }

  .orb-2 {
    width: 300px; height: 300px;
    background: var(--grad-3);
    bottom: -10%; left: -5%;
    animation: float2 10s ease-in-out infinite;
  }

  .orb-3 {
    width: 200px; height: 200px;
    background: var(--grad-1);
    top: 40%; left: 50%;
    animation: float3 12s ease-in-out infinite;
    opacity: 0.2;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-30px, 40px) scale(1.1); }
    66% { transform: translate(20px, -20px) scale(0.95); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
  }

  @keyframes float3 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-60px, 40px); }
  }

  /* ── Stats Bar ── */
  .stats-bar {
    position: absolute;
    bottom: 6rem;
    display: flex;
    gap: 3rem;
    animation: fadeInUp 1s ease 1s both;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 40%, var(--grad-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.25rem;
    font-weight: 500;
  }

  /* ── Animations ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .cta-group { flex-direction: column; width: 100%; max-width: 300px; }
    .btn { justify-content: center; }
    .stats-bar { gap: 1.5rem; }
    .stat-value { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<!-- Gradient Video Background -->
<div class="gradient-video">
  <canvas id="gradientCanvas"></canvas>
</div>

<!-- Atmospheric Layers -->
<div class="grain"></div>
<div class="vignette"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Navigation -->
<nav class="nav">
  <div class="logo">NOVA</div>
  <ul class="nav-links">
    <li><a href="#">关于我们</a></li>
    <li><a href="#">产品服务</a></li>
    <li><a href="#">案例展示</a></li>
    <li><a href="#">新闻动态</a></li>
    <li><a href="#">联系我们</a></li>
  </ul>
</nav>

<!-- Hero Content -->
<section class="hero">
  <div class="badge">
    <span class="badge-dot"></span>
    2026 全球创新峰会 · 现已开启报名
  </div>

  <h1 class="title">
    以创新之力<br><span class="highlight">重塑未来边界</span>
  </h1>

  <p class="subtitle">
    我们以前沿科技为驱动，为全球企业打造下一代数字化解决方案，
    助力每一次突破性成长。
  </p>

  <div class="cta-group">
    <a href="#" class="btn btn-primary">
      探索更多
      <span class="btn-arrow">→</span>
    </a>
    <a href="#" class="btn btn-secondary">
      观看影片 ▶
    </a>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value">500+</div>
      <div class="stat-label">全球客户</div>
    </div>
    <div class="stat">
      <div class="stat-value">98%</div>
      <div class="stat-label">满意度</div>
    </div>
    <div class="stat">
      <div class="stat-value">30+</div>
      <div class="stat-label">国家覆盖</div>
    </div>
    <div class="stat">
      <div class="stat-value">10B</div>
      <div class="stat-label">数据处理量</div>
    </div>
  </div>

  <div class="scroll-hint">
    <span>向下滚动</span>
    <div class="scroll-line"></div>
  </div>
</section>

<script>
// ── Gradient Video Canvas Animation ──
(function() {
  const canvas = document.getElementById('gradientCanvas');
  const ctx = canvas.getContext('2d');

  let w, h, time = 0;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', resize);
  resize();

  // Color palette — vibrant, bold
  const colors = [
    { r: 255, g: 45,  b: 85  },  // Hot pink
    { r: 110, g: 44,  b: 255 },  // Electric purple
    { r: 0,   g: 212, b: 255 },  // Cyan
    { r: 255, g: 138, b: 0   },  // Orange
    { r: 24,  g: 225, b: 160 },  // Mint
    { r: 255, g: 60,  b: 172 },  // Magenta
  ];

  // Animated blobs
  const blobs = [];

  for (let i = 0; i < 7; i++) {
    const col = colors[i % colors.length];
    blobs.push({
      x: Math.random(),
      y: Math.random(),
      vx: (Math.random() - 0.5) * 0.0008,
      vy: (Math.random() - 0.5) * 0.0008,
      radius: 0.25 + Math.random() * 0.2,
      color: col,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.5,
    });
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function drawBlob(blob, t) {
    const bx = (blob.x + Math.sin(t * blob.speed + blob.phase) * 0.12) * w;
    const by = (blob.y + Math.cos(t * blob.speed * 0.7 + blob.phase) * 0.12) * h;
    const r = blob.radius * Math.min(w, h) * (0.9 + Math.sin(t * 0.5) * 0.15);

    const gradient = ctx.createRadialGradient(bx, by, 0, bx, by, Math.max(1, r));
    const { r: cr, g: cg, b: cb } = blob.color;
    gradient.addColorStop(0, `rgba(${cr},${cg},${cb},0.6)`);
    gradient.addColorStop(0.4, `rgba(${cr},${cg},${cb},0.2)`);
    gradient.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
  }

  // Mesh-like flowing lines
  function drawFlowLines(t) {
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;

    for (let i = 0; i < 15; i++) {
      ctx.beginPath();
      const yBase = (i / 15) * h;
      for (let x = 0; x <= w; x += 8) {
        const y = yBase +
          Math.sin(x * 0.003 + t * 0.5 + i * 0.8) * 30 +
          Math.cos(x * 0.005 - t * 0.3 + i * 0.5) * 20;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // Particle field
  const particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * 1.2 - 0.1,
      y: Math.random() * 1.2 - 0.1,
      size: 1 + Math.random() * 2,
      speed: 0.0001 + Math.random() * 0.0003,
      alpha: 0.15 + Math.random() * 0.35,
      phase: Math.random() * Math.PI * 2,
    });
  }

  function drawParticles(t) {
    ctx.save();
    for (const p of particles) {
      const px = (p.x + Math.sin(t * 0.3 + p.phase) * 0.02) * w;
      const py = ((p.y + t * p.speed) % 1.2 - 0.1) * h;
      const alpha = p.alpha * (0.6 + Math.sin(t * 2 + p.phase) * 0.4);

      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function animate() {
    time += 0.008;

    // Dark base
    ctx.fillStyle = '#080810';
    ctx.fillRect(0, 0, w, h);

    // Blend blobs with additive-like feel
    ctx.globalCompositeOperation = 'screen';
    for (const blob of blobs) drawBlob(blob, time);
    ctx.globalCompositeOperation = 'source-over';

    // Flow lines
    drawFlowLines(time);

    // Particles
    drawParticles(time);

    // Subtle horizontal scan line
    const scanY = (time * 50) % (h + 100) - 50;
    const scanGrad = ctx.createLinearGradient(0, scanY - 30, 0, scanY + 30);
    scanGrad.addColorStop(0, 'rgba(255,255,255,0)');
    scanGrad.addColorStop(0.5, 'rgba(255,255,255,0.015)');
    scanGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = scanGrad;
    ctx.fillRect(0, scanY - 30, w, 60);

    requestAnimationFrame(animate);
  }

  animate();
})();
</script>

</body>
</html>
