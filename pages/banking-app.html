<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Bank — Cyberpunk Banking App</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  .phone-wrapper {
    position: relative;
    z-index: 1;
  }
  .phone-wrapper::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0, 240, 255, 0.08) 0%, rgba(139, 92, 246, 0.04) 40%, transparent 70%);
    filter: blur(60px);
    pointer-events: none;
  }

  /* Scrollable content area */
  .scroll-area {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* Glow utilities */
  .glow-cyan {
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), 0 0 60px rgba(0, 240, 255, 0.05);
  }
  .glow-purple {
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.15), 0 0 60px rgba(139, 92, 246, 0.05);
  }

  /* Subtle scanlines — no z-index, no interaction blocking */
  .scanlines::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 240, 255, 0.006) 2px,
      rgba(0, 240, 255, 0.006) 4px
    );
    pointer-events: none;
    z-index: 50;
    border-radius: inherit;
  }

  /* ─── Keyframes ─── */
  @keyframes shimmer {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 4px currentColor; }
    50% { box-shadow: 0 0 12px currentColor; }
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes ring-fill {
    from { stroke-dashoffset: var(--circ); }
    to { stroke-dashoffset: var(--offset); }
  }
  @keyframes float-y {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* Entrance animation helper */
  .anim-in {
    animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Interactive card/button */
  .tap {
    transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .tap:hover {
    transform: translateY(-1px);
  }
  .tap:active {
    transform: scale(0.96);
    transition-duration: 0.08s;
  }

  /* Quick action icon float */
  .action-icon {
    animation: float-y 3s ease-in-out infinite;
  }
  .action-icon:nth-child(2) { animation-delay: 0.4s; }
  .action-icon:nth-child(3) { animation-delay: 0.8s; }
  .action-icon:nth-child(4) { animation-delay: 1.2s; }

  /* Notification badge pulse */
  .notif-dot {
    animation: pulse-glow 2s ease-in-out infinite;
  }

  /* Balance text transition */
  .balance-text {
    transition: opacity 0.3s ease, filter 0.3s ease;
  }
  .balance-text.hiding {
    opacity: 0;
    filter: blur(8px);
  }

  /* Tab indicator slide */
  .tab-indicator {
    transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Transaction row hover */
  .tx-row {
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    cursor: pointer;
  }
  .tx-row:hover {
    background: rgba(15, 20, 40, 0.85) !important;
    border-color: rgba(0, 240, 255, 0.08) !important;
  }

  /* Card hover glow */
  .card-glow {
    transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
  }
  .card-glow:hover {
    border-color: rgba(0, 240, 255, 0.3) !important;
  }

  /* Horizontal scroll for card carousel */
  .card-carousel {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    padding: 0 16px;
  }
  .card-carousel::-webkit-scrollbar { display: none; }
  .card-carousel > div { scroll-snap-align: start; flex-shrink: 0; }

  /* Bar chart grow animation */
  @keyframes bar-grow {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }
  .bar-anim {
    transform-origin: bottom;
    animation: bar-grow 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Progress bar fill */
  @keyframes progress-fill {
    from { width: 0; }
  }
  .progress-anim {
    animation: progress-fill 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Settings row */
  .settings-row {
    transition: background 0.2s ease;
    cursor: pointer;
  }
  .settings-row:hover {
    background: rgba(0, 240, 255, 0.04);
  }

  /* Page transition */
  .page-enter {
    animation: slide-up 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
</style>
</head>

/* ─── Animated Data Ring ─── */
function DataRing({ size = 120, strokeWidth = 6, value = 0.72, color = T.cyan, delay = 0 }) {
  const radius = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * radius;
  const targetOffset = circ * (1 - value);
  const [mounted, setMounted] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setMounted(true), 300 + delay);
    return () => clearTimeout(t);
  }, [delay]);

  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle
        cx={size/2} cy={size/2} r={radius}
        fill="none" stroke="rgba(0,240,255,0.06)" strokeWidth={strokeWidth}
      />
      <circle
        cx={size/2} cy={size/2} r={radius}
        fill="none" stroke={color} strokeWidth={strokeWidth}
        strokeDasharray={circ}
        strokeDashoffset={mounted ? targetOffset : circ}
        strokeLinecap="round"
        style={{
          transition: 'stroke-dashoffset 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          filter: `drop-shadow(0 0 8px ${color})`,
        }}
      />
    </svg>
  );
}

/* ─── Sparkline ─── */
function Sparkline({ data = [40,55,35,60,48,72,65,80,70,90,85,95], width = 180, height = 36, color = T.cyan }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  const areaPoints = `0,${height} ${points} ${width},${height}`;

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <defs>
        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={areaPoints} fill="url(#sparkGrad)"/>
      <polyline
        points={points}
        fill="none" stroke={color} strokeWidth="1.5"
        strokeLinecap="round" strokeLinejoin="round"
        style={{ filter: `drop-shadow(0 0 4px ${color})` }}
      />
    </svg>
  );
}

/* ─── Entrance animation wrapper ─── */
function AnimIn({ children, delay = 0, style = {} }) {
  return (
    <div className="anim-in" style={{ animationDelay: `${delay}ms`, ...style }}>
      {children}

}

/* ─── Bottom Navigation (fixed at frame level) ─── */
function BottomNav({ activeTab, onTabChange }) {
  const tabs = [
    { id: 'home', icon: Icons.home, label: '首页' },
    { id: 'card', icon: Icons.card, label: '卡片' },
    { id: 'stats', icon: Icons.stats, label: '统计' },
    { id: 'profile', icon: Icons.user, label: '我的' },
  ];

  return (
    <div style={{
      position: 'absolute',
      bottom: 24, /* above home indicator */
      left: 0, right: 0,
      height: 72,
      display: 'flex',
      alignItems: 'flex-start',
      justifyContent: 'space-around',
      paddingTop: 8,
      background: 'linear-gradient(to top, rgba(10,14,26,0.97) 50%, rgba(10,14,26,0.85) 80%, transparent 100%)',
      zIndex: 5,
      pointerEvents: 'auto',
    }}>
      {tabs.map(tab => {
        const active = activeTab === tab.id;
        return (
          <div
            key={tab.id}
            onClick={() => onTabChange(tab.id)}
            className="tap"
            style={{
              display: 'flex', flexDirection: 'column',
              alignItems: 'center', gap: 3,
              padding: '6px 16px',
              borderRadius: 12,
              background: active ? 'rgba(0,240,255,0.06)' : 'transparent',
              transition: 'background 0.3s ease',
            }}
          >
            <div style={{
              color: active ? T.cyan : T.textMuted,
              transition: 'color 0.25s ease, filter 0.25s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1)',
              filter: active ? `drop-shadow(0 0 6px ${T.cyan})` : 'none',
              transform: active ? 'scale(1.1)' : 'scale(1)',
            }}>
              {tab.icon}
            </div>
            <span style={{
              fontSize: 10, fontWeight: active ? 600 : 400,
              color: active ? T.cyan : T.textMuted,
              transition: 'color 0.25s ease, font-weight 0.25s ease',
            }}>
              {tab.label}
            </span>
            <div style={{
              width: active ? 4 : 0,
              height: 4,
              borderRadius: '50%',
              background: T.cyan,
              boxShadow: `0 0 8px ${T.cyan}`,
              transition: 'width 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease',
              opacity: active ? 1 : 0,
            }} />
          </div>
        );
      })}
    </div>
  );
}

    transform: 'translateX(-50%)', width: 126, height: 34,
    background: '#000', borderRadius: '0 0 20px 20px', zIndex: 10,

  const statusBarStyle = {
    height: 54, display: 'flex', alignItems: 'flex-end',
    justifyContent: 'space-between', padding: '0 32px 8px',

    fontWeight: 600, color: '#fff', position: 'relative', zIndex: 2,

}

/* ─── Bar Chart Component ─── */
function BarChart({ data, labels, color, height = 120 }) {
  const max = Math.max(...data, 1);
  const barW = 28;
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', height, padding: '0 4px' }}>
      {data.map((v, i) => {
        const h = Math.max((v / max) * (height - 24), 4);
        return (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
            <div className="bar-anim" style={{
              width: barW, height: h, borderRadius: 6,
              background: `linear-gradient(to top, ${color}, ${T.purple})`,
              boxShadow: `0 0 10px ${color}40`,
              animationDelay: `${i * 80}ms`,
            }} />

/* ─── Main App ─── */
function BankingApp() {
  const [balanceVisible, setBalanceVisible] = useState(true);
  const [balanceHiding, setBalanceHiding] = useState(false);
  const [activeTab, setActiveTab] = useState('home');
  const scrollRef = useRef(null);

  const toggleBalance = useCallback(() => {
    setBalanceHiding(true);
    setTimeout(() => {
      setBalanceVisible(v => !v);
      setBalanceHiding(false);
    }, 200);
  }, []);

  // Scroll to top on tab change
  const handleTabChange = useCallback((tab) => {
    setActiveTab(tab);
    const sa = document.querySelector('.scroll-area');
    if (sa) sa.scrollTop = 0;
  }, []);

  const tabContent = activeTab === 'home' ? (
    <HomeTab balanceVisible={balanceVisible} balanceHiding={balanceHiding} toggleBalance={toggleBalance} />
  ) : activeTab === 'card' ? (
    <CardTab />
  ) : activeTab === 'stats' ? (
    <StatsTab />
  ) : (
    <ProfileTab />
  );

  return (
    <IOSFrame footer={<BottomNav activeTab={activeTab} onTabChange={handleTabChange} />}>
      {tabContent}
    </IOSFrame>
  );
}

/* ─── Render ─── */
ReactDOM.createRoot(document.getElementById('root')).render(<BankingApp />);
</script>
